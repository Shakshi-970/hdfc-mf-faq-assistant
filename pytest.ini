[pytest]
# Discover tests only inside the phases/phase_7/ tree so pytest doesn't
# accidentally import phase_3/phase_6 modules during collection.
testpaths = phases/phase_7/phase_7_1_unit_tests

# Show one-line summary for each test outcome
addopts = -v --tb=short

# Mark slow integration tests (require live API keys) — skip by default
markers =
    integration: requires live GROQ_API_KEY + Chroma Cloud (deselect with -m "not integration")
