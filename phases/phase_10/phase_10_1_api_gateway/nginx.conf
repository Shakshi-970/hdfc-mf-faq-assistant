# phases/phase_10/phase_10_1_api_gateway/nginx.conf
# --------------------------------------------------
# Nginx reverse proxy for the Mutual Fund FAQ Assistant.
#
# Architecture (Section 13 — docs/rag-architecture.md):
#   Client → Nginx (port 80) → FastAPI backend(s) (port 8000)
#
# Features:
#   - Reverse proxy with HTTP/1.1 keepalive to upstream
#   - Rate limiting: 10 req/min per session, 60 req/min per IP
#   - Proxy headers forwarded for accurate client IP logging
#   - /health bypasses rate limiting for monitoring probes
#   - Configurable upstream — add more servers for horizontal scaling

# ---------------------------------------------------------------------------
# Rate limiting zones (defined in http context)
# ---------------------------------------------------------------------------
# These must live in the http block — included via conf.d/*.conf so nginx
# already wraps this file in an http block.

# Per session-ID: 10 requests per minute (burst of 5 held in queue)
# Key: X-Session-ID header sent by the Streamlit UI or API client
limit_req_zone $http_x_session_id zone=per_session:10m rate=10r/m;

# Per client IP: 60 requests per minute (burst of 20)
limit_req_zone $binary_remote_addr zone=per_ip:10m     rate=60r/m;

# Shared response for 429 Too Many Requests
limit_req_status 429;

# ---------------------------------------------------------------------------
# Upstream — single backend for dev; add servers for load-balanced prod
# ---------------------------------------------------------------------------
upstream mf_faq_backend {
    server backend:8000;
    # Horizontal scaling — uncomment additional replicas:
    # server backend2:8000;
    # server backend3:8000;

    # Keep TCP connections alive between Nginx and FastAPI for performance
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Server block
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;   # match any hostname; replace with your domain in prod

    # Proxy timeouts
    proxy_connect_timeout  10s;
    proxy_read_timeout     90s;   # allow up to 90s for LLM round-trip
    proxy_send_timeout     10s;

    # ---------------------------------------------------------------------------
    # /health — no rate limiting (used by Docker HEALTHCHECK and monitoring)
    # ---------------------------------------------------------------------------
    location = /health {
        proxy_pass         http://mf_faq_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ---------------------------------------------------------------------------
    # /chat/* — rate-limited (hits the LLM; most expensive endpoint)
    # ---------------------------------------------------------------------------
    location ^~ /chat/ {
        # Per-session limit: 10 req/min, burst 5 (queued without error)
        limit_req zone=per_session burst=5 nodelay;
        # Per-IP limit: 60 req/min, burst 20
        limit_req zone=per_ip      burst=20 nodelay;

        proxy_pass         http://mf_faq_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ---------------------------------------------------------------------------
    # All other endpoints (sessions, etc.) — IP rate limit only
    # ---------------------------------------------------------------------------
    location / {
        limit_req zone=per_ip burst=20 nodelay;

        proxy_pass         http://mf_faq_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ---------------------------------------------------------------------------
    # Custom error pages
    # ---------------------------------------------------------------------------
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Rate limit exceeded. Please wait before retrying.","retry_after_seconds":60}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        default_type application/json;
        return 503 '{"error":"Backend service temporarily unavailable. Please try again shortly."}';
    }
}
