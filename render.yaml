services:
  - type: web
    name: mf-faq-backend
    runtime: python
    pythonVersion: "3.11.9"
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn phases.phase_6.phase_6_1_groq_pipeline.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: LLM_PROVIDER
        value: groq
